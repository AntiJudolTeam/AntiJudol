<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>AntiJudol - Validate</title>
    <style>
      * {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
      }
      body {
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
        background: #0a0a0a;
        color: #e0e0e0;
        min-height: 100vh;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        padding: 40px 20px;
      }
      .card {
        width: 100%;
        max-width: 560px;
        background: #141414;
        border: 1px solid #222;
        border-radius: 12px;
        padding: 32px;
      }
      .header {
        display: flex;
        align-items: center;
        justify-content: space-between;
        margin-bottom: 24px;
      }
      .header-left {
        display: flex;
        align-items: center;
        gap: 10px;
      }
      .logo {
        width: 32px;
        height: 32px;
        background: #4a9eff;
        border-radius: 8px;
        display: flex;
        align-items: center;
        justify-content: center;
        font-weight: 700;
        font-size: 16px;
        color: #fff;
      }
      .header h1 {
        font-size: 20px;
        font-weight: 600;
        letter-spacing: -0.3px;
      }
      .github-link {
        color: #555;
        transition: color 0.2s;
      }
      .github-link:hover {
        color: #e0e0e0;
      }
      .subtitle {
        color: #666;
        font-size: 13px;
        margin-bottom: 24px;
      }

      label {
        display: block;
        font-size: 12px;
        color: #666;
        margin-bottom: 6px;
        text-transform: uppercase;
        letter-spacing: 0.5px;
      }
      input,
      textarea {
        width: 100%;
        padding: 12px 14px;
        border: 1px solid #2a2a2a;
        border-radius: 8px;
        background: #0a0a0a;
        color: #e0e0e0;
        font-size: 14px;
        outline: none;
        transition: border-color 0.2s;
        font-family: inherit;
      }
      input:focus,
      textarea:focus {
        border-color: #4a9eff;
      }
      input::placeholder,
      textarea::placeholder {
        color: #444;
      }
      textarea {
        resize: vertical;
        min-height: 96px;
      }
      .field {
        margin-bottom: 16px;
      }

      .check-btn {
        width: 100%;
        margin-top: 8px;
        padding: 12px 16px;
        border: none;
        border-radius: 8px;
        background: #4a9eff;
        color: #fff;
        font-size: 14px;
        font-weight: 600;
        cursor: pointer;
        transition: background 0.2s;
      }
      .check-btn:hover {
        background: #3a8eef;
      }
      .check-btn:disabled {
        background: #2a2a2a;
        color: #555;
        cursor: not-allowed;
      }

      .result {
        margin-top: 24px;
        display: none;
        animation: fadeIn 0.2s ease;
      }
      .result.visible {
        display: block;
      }

      .verdict {
        display: inline-block;
        padding: 6px 12px;
        border-radius: 6px;
        font-size: 12px;
        font-weight: 600;
        letter-spacing: 0.5px;
        text-transform: uppercase;
        margin-bottom: 12px;
      }
      .verdict.block {
        background: rgba(255, 92, 92, 0.1);
        color: #ff5c5c;
        border: 1px solid rgba(255, 92, 92, 0.3);
      }
      .verdict.allow {
        background: rgba(74, 223, 138, 0.1);
        color: #4adf8a;
        border: 1px solid rgba(74, 223, 138, 0.3);
      }

      .replacement-box {
        padding: 12px 14px;
        background: #0a0a0a;
        border: 1px solid #2a2a2a;
        border-radius: 8px;
        margin-top: 8px;
        font-size: 13px;
        color: #bbb;
        line-height: 1.5;
      }
      .replacement-box strong {
        color: #888;
        font-size: 11px;
        text-transform: uppercase;
        letter-spacing: 0.5px;
        display: block;
        margin-bottom: 4px;
      }

      .feedback {
        margin-top: 20px;
        padding-top: 20px;
        border-top: 1px solid #222;
      }
      .feedback-prompt {
        font-size: 13px;
        color: #888;
        margin-bottom: 12px;
      }
      .feedback-buttons {
        display: flex;
        gap: 8px;
      }
      .feedback-btn {
        flex: 1;
        padding: 10px;
        border: 1px solid #2a2a2a;
        border-radius: 8px;
        background: #1a1a1a;
        color: #e0e0e0;
        font-size: 13px;
        cursor: pointer;
        transition: all 0.2s;
      }
      .feedback-btn:hover {
        border-color: #4a9eff;
      }
      .feedback-btn.correct:hover {
        border-color: #4adf8a;
        color: #4adf8a;
      }
      .feedback-btn.wrong:hover {
        border-color: #ff5c5c;
        color: #ff5c5c;
      }
      .feedback-btn.correct.selected {
        background: rgba(74, 223, 138, 0.15);
        border-color: #4adf8a;
        color: #4adf8a;
      }
      .feedback-btn.wrong.selected {
        background: rgba(255, 92, 92, 0.15);
        border-color: #ff5c5c;
        color: #ff5c5c;
      }
      .feedback-btn:disabled {
        opacity: 0.5;
        cursor: not-allowed;
      }
      .feedback-btn.selected:disabled {
        opacity: 1;
      }

      .thanks {
        margin-top: 16px;
        padding: 12px 14px;
        background: rgba(74, 223, 138, 0.08);
        border: 1px solid rgba(74, 223, 138, 0.2);
        border-radius: 8px;
        font-size: 13px;
        color: #4adf8a;
        display: none;
        align-items: center;
        justify-content: space-between;
        gap: 12px;
      }
      .thanks.visible {
        display: flex;
      }
      .retry-btn {
        padding: 6px 12px;
        border: 1px solid rgba(74, 223, 138, 0.4);
        border-radius: 6px;
        background: transparent;
        color: #4adf8a;
        font-size: 12px;
        font-weight: 600;
        cursor: pointer;
        transition: all 0.2s;
        white-space: nowrap;
      }
      .retry-btn:hover {
        background: rgba(74, 223, 138, 0.1);
      }

      .error {
        color: #ff5c5c;
        font-size: 13px;
        margin-top: 12px;
        display: none;
      }
      .error.visible {
        display: block;
      }

      .nav {
        margin-top: 16px;
        font-size: 12px;
        color: #555;
      }
      .nav a {
        color: #777;
        text-decoration: none;
      }
      .nav a:hover {
        color: #e0e0e0;
      }

      .footer {
        margin-top: 32px;
        text-align: center;
        font-size: 12px;
        color: #444;
      }
      .footer a {
        color: #555;
        text-decoration: none;
      }
      .footer a:hover {
        color: #888;
      }

      @keyframes fadeIn {
        from {
          opacity: 0;
          transform: translateY(4px);
        }
        to {
          opacity: 1;
          transform: translateY(0);
        }
      }
    </style>
    <link rel="icon" type="image/png" sizes="32x32" href="/favicon-32x32.png" />
    <link rel="icon" type="image/png" sizes="16x16" href="/favicon-16x16.png" />
    <link rel="shortcut icon" href="/favicon.ico?v=1" />
  </head>
  <body>
    <div class="card">
      <div class="header">
        <div class="header-left">
          <div class="logo">A</div>
          <h1>Validasi Pesan</h1>
        </div>
        <a href="https://github.com/AntiJudolTeam/AntiJudol" target="_blank" class="github-link" title="GitHub">
          <svg width="22" height="22" viewBox="0 0 24 24" fill="currentColor">
            <path
              d="M12 0C5.37 0 0 5.37 0 12c0 5.31 3.435 9.795 8.205 11.385.6.105.825-.255.825-.57 0-.285-.015-1.23-.015-2.235-3.015.555-3.795-.735-4.035-1.41-.135-.345-.72-1.41-1.23-1.695-.42-.225-1.02-.78-.015-.795.945-.015 1.62.87 1.845 1.23 1.08 1.815 2.805 1.305 3.495.99.105-.78.42-1.305.765-1.605-2.67-.3-5.46-1.335-5.46-5.925 0-1.305.465-2.385 1.23-3.225-.12-.3-.54-1.53.12-3.18 0 0 1.005-.315 3.3 1.23.96-.27 1.98-.405 3-.405s2.04.135 3 .405c2.295-1.56 3.3-1.23 3.3-1.23.66 1.65.24 2.88.12 3.18.765.84 1.23 1.905 1.23 3.225 0 4.605-2.805 5.625-5.475 5.925.435.375.81 1.095.81 2.22 0 1.605-.015 2.895-.015 3.3 0 .315.225.69.825.57A12.02 12.02 0 0024 12c0-6.63-5.37-12-12-12z"
            />
          </svg>
        </a>
      </div>

      <p class="subtitle">
        Bantu kami membuat filter AntiJudol lebih baik, simulasikan pesan donasi dan beri tahu kami apakah hasilnya
        benar.
      </p>

      <div class="field">
        <label for="donator">Nama</label>
        <input type="text" id="donator" placeholder="e.g. bobby" autocomplete="off" />
      </div>

      <div class="field">
        <label for="message">Pesan</label>
        <textarea id="message" placeholder="e.g. slot gacor hari ini"></textarea>
      </div>

      <button class="check-btn" id="check-btn" onclick="runCheck()">Kirim</button>

      <div class="error" id="error"></div>

      <div class="result" id="result">
        <div class="verdict" id="verdict"></div>
        <div class="replacement-box" id="replacement" style="display: none">
          <strong>Pesan pengganti yang ditampilkan kepada streamer:</strong>
          <div id="replacement-text"></div>
        </div>

        <div class="feedback" id="feedback">
          <div class="feedback-prompt" id="feedback-prompt"></div>
          <div class="feedback-buttons">
            <button class="feedback-btn correct" id="btn-correct" onclick="sendFeedback('correct')">Benar</button>
            <button class="feedback-btn wrong" id="btn-wrong" onclick="sendFeedback('false-positive')"></button>
          </div>
          <div class="thanks" id="thanks">
            <span>Terima kasih atas feedback Anda!</span>
            <button class="retry-btn" id="retry-btn" onclick="resetForm()">Coba lagi?</button>
          </div>
        </div>
      </div>
    </div>

    <div class="footer">Made by <a href="https://github.com/AntiJudolTeam" target="_blank">AntiJudol Team</a></div>

    <script>
      const donatorInput = document.getElementById("donator");
      const messageInput = document.getElementById("message");
      const checkBtn = document.getElementById("check-btn");
      const resultDiv = document.getElementById("result");
      const verdictEl = document.getElementById("verdict");
      const replacementBox = document.getElementById("replacement");
      const replacementText = document.getElementById("replacement-text");
      const feedbackPrompt = document.getElementById("feedback-prompt");
      const btnCorrect = document.getElementById("btn-correct");
      const btnWrong = document.getElementById("btn-wrong");
      const thanks = document.getElementById("thanks");
      const errorEl = document.getElementById("error");

      let lastCheck = null;

      async function runCheck() {
        const donator = donatorInput.value.trim();
        const message = messageInput.value.trim();

        errorEl.classList.remove("visible");
        resultDiv.classList.remove("visible");
        thanks.classList.remove("visible");

        if (!message) {
          errorEl.textContent = "Pesan wajib diisi.";
          errorEl.classList.add("visible");
          return;
        }

        checkBtn.disabled = true;
        checkBtn.textContent = "Checking…";

        try {
          const res = await fetch("/check", {
            method: "POST",
            headers: { "content-type": "application/json" },
            body: JSON.stringify({ platform: "validate", donator, message }),
          });
          const data = await res.json();
          lastCheck = { donator, message, decision: data.action };
          renderResult(data);
        } catch (err) {
          errorEl.textContent = "Kesalahan jaringan. Silakan coba lagi.";
          errorEl.classList.add("visible");
        } finally {
          checkBtn.disabled = false;
          checkBtn.textContent = "Kirim";
        }
      }

      function renderResult(data) {
        const blocked = data.action === "block";
        verdictEl.textContent = blocked ? "Diblokir" : "Diizinkan";
        verdictEl.className = "verdict " + (blocked ? "block" : "allow");

        if (blocked && data.replaceMessage) {
          replacementText.textContent = data.replaceMessage;
          replacementBox.style.display = "block";
        } else {
          replacementBox.style.display = "none";
        }

        feedbackPrompt.textContent = blocked
          ? "Apakah hasilnya benar, atau pesan ini seharusnya tidak diblokir?"
          : "Apakah hasilnya benar, atau pesan ini seharusnya diblokir?";
        btnWrong.textContent = blocked ? "Seharusnya tidak diblokir" : "Seharusnya diblokir";

        btnCorrect.classList.remove("selected");
        btnWrong.classList.remove("selected");
        btnCorrect.disabled = false;
        btnWrong.disabled = false;
        resultDiv.classList.add("visible");
      }

      async function sendFeedback(verdict) {
        if (!lastCheck) return;
        const chosen = verdict === "correct" ? btnCorrect : btnWrong;
        chosen.classList.add("selected");
        btnCorrect.disabled = true;
        btnWrong.disabled = true;

        try {
          const res = await fetch("/feedback", {
            method: "POST",
            headers: { "content-type": "application/json" },
            body: JSON.stringify({ ...lastCheck, verdict }),
          });
          if (res.status === 429) {
            const data = await res.json().catch(() => ({}));
            const mins = Math.max(1, Math.ceil((data.retryAfter || 60) / 60));
            errorEl.textContent = `Terlalu banyak feedback. Coba lagi dalam ${mins} menit.`;
            errorEl.classList.add("visible");
            chosen.classList.remove("selected");
            btnCorrect.disabled = false;
            btnWrong.disabled = false;
            return;
          }
          if (!res.ok) throw new Error("bad status");
          thanks.classList.add("visible");
        } catch {
          errorEl.textContent = "Gagal mengirim feedback.";
          errorEl.classList.add("visible");
          chosen.classList.remove("selected");
          btnCorrect.disabled = false;
          btnWrong.disabled = false;
        }
      }

      function resetForm() {
        donatorInput.value = "";
        messageInput.value = "";
        resultDiv.classList.remove("visible");
        thanks.classList.remove("visible");
        errorEl.classList.remove("visible");
        lastCheck = null;
        donatorInput.focus();
      }

      messageInput.addEventListener("keydown", (e) => {
        if (e.key === "Enter" && (e.ctrlKey || e.metaKey)) runCheck();
      });
    </script>
  </body>
</html>
